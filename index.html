<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STRUCTUS | Stran v izdelavi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Condensed:wght@700&display=swap');

        :root {
            --black: #0a0a0a;
            --yellow: #fbaa19;
            --gray: #1f1f1f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body { height: 100%; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: #eee;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .logo {
            height: 130px;
            width: auto;
            object-fit: contain;
            margin-bottom: 2rem;
        }

        h1 {
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 2.4rem;
            letter-spacing: 1px;
            color: var(--yellow);
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 500px;
        }

        .stripe {
            background: repeating-linear-gradient(45deg, var(--yellow), var(--yellow) 20px, #000 20px, #000 40px);
            height: 8px;
            width: 100%;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 3rem 8%;
            color: #aaa;
        }

        footer .contact {
            max-width: 500px;
            margin: 0 auto;
            border: 2px solid var(--yellow);
            border-radius: 10px;
            padding: 2rem;
            background: #111;
        }

        footer .contact p {
            margin: 0.4rem 0;
            color: #eee;
        }

        footer .contact strong {
            color: var(--yellow);
        }

        footer .copyright {
            margin-top: 2rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <main>
        <img src="Logo_Stran_PNG.png" alt="STRUCTUS Logo" class="logo">
        <h1>Stran je v izdelavi</h1>
        <p class="subtitle">Kmalu vam predstavimo novo spletno stran. Hvala za razumevanje.</p>
    </main>

    <footer>
        <div class="stripe" style="margin-bottom: 2rem;"></div>
        <div class="contact">
            <p><strong>Telefon:</strong> +386 70 842 800</p>
            <p><strong>Email:</strong> structus.gradnje@gmail.com</p>
            <p><strong>Naslov:</strong> Pavlova vas 28, 8255 Pišece</p>
        </div>
        <p class="copyright">&copy; 2026 STRUCTUS Gradnje d.o.o. All Rights Reserved.</p>
    </footer>

</body>
</html>
